# Stage ownership is explicit. Fast hygiene and file-scoped formatters run at
# commit (default_stages); the heavy Go checks run only at the pre-push gate
# (.git/hooks/pre-push runs `pre-commit run --hook-stage pre-push --all-files`).
# This keeps commits fast and stops a Go-only push from invoking the TS/Rust
# verifier toolchains it never touched. Secret and large-file gates run at both.
default_stages: [pre-commit]

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # The vendored receipt-verifier conformance corpus must stay
        # byte-identical to the agent-egress-bench master (the drift guard
        # enforces this with cmp). Hygiene rewrites would break that parity —
        # some fixtures intentionally omit a trailing newline.
        exclude: '^sdk/conformance/testdata/corpus/'
      - id: end-of-file-fixer
        exclude: '^sdk/conformance/testdata/corpus/'
      - id: check-yaml
        # Narrow: name only the intentionally-malformed strict-YAML test
        # fixtures. The rest of internal/contract/testdata/invalid/ stays
        # under check-yaml so accidental corruption is still caught.
        exclude: |
          (?x)^(
            charts/.*/templates/.*|
            internal/contract/testdata/invalid/duplicate_key\.yaml|
            internal/contract/testdata/invalid/yaml_alias\.yaml|
            internal/contract/testdata/invalid/yaml_anchor\.yaml|
            internal/contract/testdata/invalid/yaml_custom_tag\.yaml|
            internal/contract/testdata/invalid/yaml_longform_tag\.yaml|
            internal/contract/testdata/invalid/yaml_merge_key\.yaml|
            internal/contract/testdata/invalid/yaml_multi_doc\.yaml
          )$
      - id: check-merge-conflict
      - id: detect-private-key
        # Secret gate also runs at the push boundary as a backstop.
        stages: [pre-commit, pre-push]
      - id: check-added-large-files
        args: ['--maxkb=500']
        stages: [pre-commit, pre-push]

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        # Secret gate also runs at the push boundary as a backstop.
        stages: [pre-commit, pre-push]

  # Go: vet, build, test. Heavy checks, scoped to the pre-push gate so commits
  # stay fast (matches the .git/hooks/pre-push comment's stated intent).
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-push]

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-push]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --new-from-rev=HEAD~1
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-push]

      - id: go-test
        name: go test
        entry: go test -race -count=1 ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-push]

      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-push]

  # Rust verifier: cargo fmt --check on sdk/verifiers/rust/.
  # Matches the verifiers.yaml `cargo fmt --check` CI step so the same
  # formatter rules block locally before they block CI.
  - repo: local
    hooks:
      - id: cargo-fmt-verifier-rust
        name: cargo fmt (sdk/verifiers/rust)
        entry: bash -c 'cd sdk/verifiers/rust && cargo fmt --check'
        language: system
        pass_filenames: false
        files: ^sdk/verifiers/rust/(.*\.rs|\.?rustfmt\.toml)$
        # Commit-stage + files-scoped: only runs when Rust verifier files are
        # staged, so it never gates a Go-only push. CI is the backstop.
        stages: [pre-commit]

  # TypeScript verifier: prettier --check on sdk/verifiers/ts/.
  # Matches the verifiers.yaml `npm run format:check` CI step. Commit-stage +
  # files-scoped: only runs when TS verifier sources or config are staged, so a
  # Go-only push never needs sdk/verifiers/ts/node_modules. CI is the backstop.
  - repo: local
    hooks:
      - id: prettier-verifier-ts
        name: prettier (sdk/verifiers/ts)
        entry: bash -c 'cd sdk/verifiers/ts && npm run --silent format:check'
        language: system
        pass_filenames: false
        files: ^sdk/verifiers/ts/(.*\.(ts|js|mjs|json|md)|\.prettierignore)$
        stages: [pre-commit]

  # Write marker for pre-push-gate.sh so it skips re-running lint+test.
  # Runs as post-commit, so HEAD is the newly created commit SHA.
  # pre-push-gate.sh checks this marker to avoid double-running checks.
  - repo: local
    hooks:
      - id: push-marker
        name: push-marker
        entry: bash -c 'git rev-parse HEAD > /tmp/pipelock-checks-passed'
        language: system
        pass_filenames: false
        stages: [post-commit]
        always_run: true
