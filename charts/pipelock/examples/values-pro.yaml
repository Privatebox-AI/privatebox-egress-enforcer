# Licensed install example: mounts a Pro or Enterprise token from a Secret.
# It also enables the free authenticated admin API and Sentry DSN wiring as
# optional operational controls, plus per-agent profiles under .pipelock.agents.
#
# Prerequisites:
#   kubectl create secret generic pipelock-license \
#     --from-file=license.token=./pipelab-master.token
#   kubectl create secret generic pipelock-admin \
#     --from-literal=token=$(openssl rand -hex 32)
#   kubectl create secret generic pipelock-sentry \
#     --from-literal=dsn=https://...@sentry.io/...
#
# Install (from repo root):
#   helm install pipelock ./charts/pipelock -f charts/pipelock/examples/values-pro.yaml

replicaCount: 2

license:
  enabled: true
  existingSecret: pipelock-license

sentry:
  enabled: true
  dsnSecretRef:
    name: pipelock-sentry
    key: dsn

adminApi:
  enabled: true
  tokenSecretRef:
    name: pipelock-admin
    key: token

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: pipelock

pipelock:
  mode: strict
  enforce: true
  mediation_envelope:
    actor_format: spiffe
  health_watchdog:
    enabled: true
    expose_subsystems: false
  agents:
    - name: claude-code
      cidr: "10.0.0.0/16"
      mode: balanced
    - name: cursor
      cidr: "10.1.0.0/16"
      mode: strict
